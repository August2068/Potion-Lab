<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Potion lab</title>
</head>
<body>
    <div class="gameContainer myCursor">
        <!-- Titre -->
        <h1>Potion Lab</h1>
        <!-- Mix des potions -->
        <div class="gameScreen">
            <div class="potionsToFuse">
                <!-- Potion basée en local storage -->
                <div class="potionContainer" id="oldPotion">
                    <img src="assets/images/weak-potion.png" alt="potion image" srcset="">
                    <p></p>
                    <select name="potionselector" id="potionselect"></select>
                </div>
                <!-- Potion aléatoire -->
                <div class="potionContainer" id="newPotion">
                    <img src="assets/images/legendary-potion.png" alt="potion image" srcset="">
                    <p></p>
                </div>
            </div>
            <!-- shakerContainer : animation ? -->
            <div class="shaker">
                <div class="shakerContainer">
                    <img src="assets/images/shaker.png" alt="shaker image" srcset="">
                    <p id="fuseMEANDLEAVEMEALONE">Fuse</p>
                </div>
            </div>
            <div class="potionFused">
                <!-- Potion fusionnée, stockée en local storage -->
                <div class="potionContainer" id="fusedPotion">
                    <img src="assets/images/powerful-potion.png" alt="potion image" srcset="">
                    <p></p>
                </div>
            </div>
            <div>
                <p id="sellButton">Sell</p>
            </div>
        </div>
        <!-- Fenêtre des stats -->
        <div class="scoreScreen">
            <!-- Bouton refresh de la potion aléatoire + nombre de fois restantes -->
            <div class="refresh">
                <button type="button">
                    Refresh
                </button>
                <p>2 tries</p>
            </div>
            <!-- Tour actuel + nombre de tour restant -->
            <div class="round">

                <p>Round : <span id="roundNumber">0/10</span></p>
            </div>
            <div class="level">
                <p>Level: <span id="levelNumber">0</span></p>
            </div>
            <!-- Score total -->
            <div class="scoreNumber">
                <p>Coins: <span id="scoreTotal">0</span> 🪙</p>
            </div>
            <!-- Objectifs à accomplir -->
            <div class="objectivePotion">
                <p>Goals :</p>
                <ul>
                    <li>Effect: <span id="effectOBJ"></span></li>
                    <li>Power: <span id="powerOBJ"></span></li>
                </ul>
                <div><p>Color <span id="colorOBJ">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p></div>
            </div>
        </div>  
        </div>
        <!-- Potion magique -->
        <div class="magicPotion">
            <img src="assets/images/love-potion.png" alt="">
        </div>
        <!-- Musiques et sound effects -->
        <audio loop id="musicBG">
            <source src="assets/music/background_music.wav" type="audio/wav"/>     
        </audio>
        <audio id="musicFuse1">
            <source src="assets/music/fuseSound.wav" type="audio/wav"/>     
        </audio>
        <audio id="musicFuse2">
            <source src="assets/music/fuseSound.wav" type="audio/wav"/>     
        </audio>
        <audio id="musicFuse3">
            <source src="assets/music/fuseSound.wav" type="audio/wav"/>     
        </audio>
        <audio id="musicFuse4">
            <source src="assets/music/fuseSound.wav" type="audio/wav"/>     
        </audio>
        <audio id="musicFuse5">
            <source src="assets/music/fuseSound.wav" type="audio/wav"/>     
        </audio>
    </div>
</body>
<!-- Script -->
<script src="script.js" type="module"></script>
</html>
